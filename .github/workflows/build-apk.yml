name: Build Android APK

on:
  push:
    branches:
      - main
  release:
    types: [created]

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build Web App
        run: npm run build

      - name: Install and configure Capacitor
        run: |
          npm install @capacitor/core
          npm install -D @capacitor/cli @capacitor/android
          npx cap init "PureFood Sellers" com.purefood.sellers --web-dir dist
          npx cap add android
          
      - name: Fix Kotlin duplicate classes
        run: |
          cat <<EOF >> android/build.gradle
          
          subprojects {
              configurations.all {
                  resolutionStrategy {
                      force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'
                      exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
                      exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
                  }
              }
          }
          EOF

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Build APK
        working-directory: ./android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload APK to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: purefood-sellers-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      - name: Create or Update Latest Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "android/app/build/outputs/apk/debug/app-debug.apk"
          tag: "latest"
          name: "Latest Build"
          body: "Automatically generated APK from the latest push."
          allowUpdates: true
          replacesArtifacts: true
          makeLatest: true
